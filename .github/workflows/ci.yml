name: CI — Pull Request Checks

on:
  workflow_dispatch: {}

jobs:
  # ── 1. Worker unit tests ──────────────────────────────────────────────────
  worker-tests:
    name: Worker Unit Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aethera-worker

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: aethera-worker/package-lock.json

      - name: Install Worker dependencies
        run: npm ci --legacy-peer-deps

      - name: Run Worker unit tests
        run: npm test
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  # ── 2. Next.js build check ────────────────────────────────────────────────
  nextjs-build:
    name: Next.js Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js site
        run: npm run build
        env:
          NEXT_PUBLIC_WORKER_URL: https://aethera-forms.aetherahealthcare.workers.dev
          NEXT_PUBLIC_SITE_URL: https://aetherahealthcare.com

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-out
          path: out/
          retention-days: 1

  # ── 3. Playwright E2E (against production) ───────────────────────────────
  e2e-smoke:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [nextjs-build]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run smoke + security header tests
        run: npx playwright test tests/e2e/smoke.spec.ts tests/e2e/security-headers.spec.ts tests/e2e/worker-api.spec.ts
        env:
          BASE_URL: https://aetherahealthcare.com

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-ci
          path: playwright-report/
          retention-days: 7
