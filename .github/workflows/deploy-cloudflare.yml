name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages (production)
        run: npx wrangler pages deploy out --project-name=aetherahealthcare-website
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Fix custom domain routing
        run: |
          BASE="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects"
          PROJECT="aetherahealthcare-website"
          DOMAIN="aetherahealthcare.com"

          echo "=== Current domain status on ${PROJECT} ==="
          STATUS_RESP=$(curl -s \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${BASE}/${PROJECT}/domains/${DOMAIN}")
          echo "${STATUS_RESP}"

          STATUS=$(echo "${STATUS_RESP}" | grep -o '"status":"[^"]*"' | head -1 | sed 's/"status":"//;s/"//')
          SUCCESS=$(echo "${STATUS_RESP}" | grep -o '"success":true' | head -1)
          echo "Parsed status: '${STATUS}', success: '${SUCCESS}'"

          if [ -z "${SUCCESS}" ]; then
            echo "Domain not found on ${PROJECT} — adding..."
            ADD_RESP=$(curl -s -X POST "${BASE}/${PROJECT}/domains" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${DOMAIN}\"}")
            echo "Add response: ${ADD_RESP}"
          elif [ "${STATUS}" = "initializing" ] || [ "${STATUS}" = "blocked" ] || [ "${STATUS}" = "error" ]; then
            echo "Status is '${STATUS}' — deleting and re-adding..."
            DEL_RESP=$(curl -s -X DELETE "${BASE}/${PROJECT}/domains/${DOMAIN}" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}")
            echo "Delete response: ${DEL_RESP}"
            sleep 5
            ADD_RESP=$(curl -s -X POST "${BASE}/${PROJECT}/domains" \
              -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
              -H "Content-Type: application/json" \
              -d "{\"name\":\"${DOMAIN}\"}")
            echo "Re-add response: ${ADD_RESP}"
          else
            echo "Domain status is '${STATUS}' — no change needed"
          fi

          echo "=== Final domain status ==="
          curl -s \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "${BASE}/${PROJECT}/domains/${DOMAIN}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        continue-on-error: true
